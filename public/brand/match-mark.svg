<svg
  viewBox="0 0 128 96"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <defs>
    <linearGradient id="match-mark-fill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c7af2" />
      <stop offset="1" stop-color="#4f46e5" />
    </linearGradient>
    <linearGradient id="match-mark-stroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
  </defs>

  <!-- Right heart: filled indigo. Drawn from the centre top, sweeping out and down to the point. -->
  <path
    d="M73 26
       C73 14, 92 8, 102 18
       C113 28, 109 50, 88 70
       C82 76, 73 84, 73 84
       C73 84, 64 76, 58 70
       C37 50, 33 28, 44 18
       C54 8, 73 14, 73 26 Z"
    fill="url(#match-mark-fill)"
  />

  <!-- Left heart: outlined violet, mirrored to interlock with the right one. -->
  <path
    d="M55 26
       C55 14, 36 8, 26 18
       C15 28, 19 50, 40 70
       C46 76, 55 84, 55 84
       C55 84, 64 76, 70 70
       C91 50, 95 28, 84 18
       C74 8, 55 14, 55 26 Z"
    fill="none"
    stroke="url(#match-mark-stroke)"
    stroke-width="5"
    stroke-linejoin="round"
  />

  <!-- Sparkle to the upper-right of the mark. -->
  <path
    d="M114 16
       L116 22
       L122 24
       L116 26
       L114 32
       L112 26
       L106 24
       L112 22 Z"
    fill="#c4b5fd"
  />
</svg>
