<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>match — all pages</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root{
    --bg: oklch(0.985 0.005 85);
    --bg-2: oklch(0.97 0.006 85);
    --ink: oklch(0.22 0.02 265);
    --ink-2: oklch(0.45 0.02 265);
    --ink-3: oklch(0.62 0.015 265);
    --line: oklch(0.92 0.005 85);
    --line-2: oklch(0.88 0.008 85);
    --card: #ffffff;
    --accent-a: #FFB39A;
    --accent-b: #FF7A8A;
    --primary: #FF8A6B;
    --radius-lg: 28px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --shadow-card: 0 1px 0 rgba(255,255,255,.9) inset, 0 1px 2px rgba(30,20,10,.04), 0 8px 24px -12px rgba(30,20,10,.08);
    --font-display: 'Instrument Serif', serif;
    --font-ui: 'Inter', ui-sans-serif, system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', ui-monospace, monospace;
    --pad: 28px;
    --gap: 20px;
  }

  [data-density="compact"]{ --pad: 18px; --gap: 14px; }
  [data-density="comfy"]  { --pad: 34px; --gap: 26px; }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family: var(--font-ui);
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    min-height:100vh;
    letter-spacing: -0.005em;
  }

  body::before{
    content:"";position:fixed;inset:0;
    background:
      radial-gradient(1200px 600px at 85% -10%, color-mix(in oklab, var(--primary) 14%, transparent), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, color-mix(in oklab, #A8C5FF 18%, transparent), transparent 60%);
    pointer-events:none;z-index:0;
  }
  #root{position:relative;z-index:1}

  .display{ font-family: var(--font-display); font-weight:400; letter-spacing:-0.02em; }
  .mono{ font-family: var(--font-mono); }

  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding: 20px 36px;
    border-bottom: 1px solid var(--line);
    background: color-mix(in oklab, var(--bg) 82%, transparent);
    backdrop-filter: blur(10px);
    position:sticky;top:0;z-index:20;
  }
  .logo{
    font-family: var(--font-display);font-weight:400;font-style:italic;
    font-size: 30px;letter-spacing:-.03em;color:var(--ink);
    display:flex;align-items:center;gap:10px;
  }
  .logo::before{
    content:"";width:10px;height:10px;border-radius:50%;
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));
    box-shadow: 0 0 0 4px color-mix(in oklab, var(--accent-b) 18%, transparent);
  }
  .top-right{display:flex;align-items:center;gap:14px}

  .search{
    display:flex;align-items:center;gap:10px;
    padding: 9px 14px;background: #fff;border: 1px solid var(--line);
    border-radius: 999px;width: 320px;color: var(--ink-3);font-size: 13px;
    box-shadow: var(--shadow-card);
  }
  .icon-btn{
    width:40px;height:40px;border-radius:50%;border:1px solid var(--line);
    background:#fff;display:grid;place-items:center;color:var(--ink-2);cursor:pointer;
    box-shadow: var(--shadow-card);
  }
  .avatar{
    width:40px;height:40px;border-radius:50%;
    background: linear-gradient(135deg, #A8C5FF, #B8A6FF);
    display:grid;place-items:center;color:#fff;font-weight:600;font-size:14px;
  }

  .sidebar{
    position:fixed;left:0;bottom:0;
    width:100%;height:72px;
    background: #fff;border-top: 1px solid var(--line);
    display:flex;align-items:center;justify-content:center;gap:32px;
    box-shadow: 0 -4px 16px rgba(0,0,0,.06);
    z-index:50;
  }
  .nav-link{
    display:flex;flex-direction:column;align-items:center;gap:6px;
    padding:10px 18px;border-radius:12px;
    font-size:11px;font-weight:600;text-decoration:none;
    color:var(--ink-3);cursor:pointer;transition:.2s;
  }
  .nav-link:hover,.nav-link.active{
    background:var(--bg-2);color:var(--ink);
  }
  .nav-link.active{
    background: linear-gradient(135deg, color-mix(in oklab, var(--accent-a) 20%, transparent), color-mix(in oklab, var(--accent-b) 20%, transparent));
    color:var(--primary);
  }

  .shell{max-width:1440px;margin:0 auto;padding:36px 36px 120px;}
  .page-head{
    display:flex;align-items:flex-end;justify-content:space-between;
    margin-bottom:28px;gap:24px;
  }
  .page-head h1{
    font-family: var(--font-display);font-weight:400;
    font-size:clamp(36px,3.8vw,52px);line-height:1.02;letter-spacing:-.025em;
    margin:0 0 6px;
  }
  .page-head h1 em{font-style:italic;color:color-mix(in oklab, var(--primary) 80%, var(--ink));}

  .card{
    background: var(--card);border: 1px solid var(--line);border-radius: var(--radius-lg);
    padding: var(--pad);box-shadow: var(--shadow-card);overflow:hidden;
  }
  .card-head{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:24px;
  }
  .card-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.12em;color:var(--ink-3);}
  .card-lead{font-family:var(--font-display);font-size:24px;font-weight:400;letter-spacing:-.02em;color:var(--ink);margin-top:2px;}

  .btn{
    display:inline-flex;align-items:center;gap:8px;padding:11px 18px;
    border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;border:none;
    font-family:inherit;letter-spacing:-.005em;transition:transform .12s ease;white-space:nowrap;
  }
  .btn:hover{transform:translateY(-1px);}
  .btn-primary{
    background: linear-gradient(135deg, var(--accent-a), var(--accent-b));color:#fff;
    box-shadow:0 6px 18px -6px color-mix(in oklab, var(--accent-b) 80%, transparent);
  }
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line-2);}
  .btn-ghost:hover{background:var(--bg-2);}
  .btn-sm{padding:8px 12px;font-size:12px;}

  .chip{
    display:inline-flex;align-items:center;gap:8px;padding:6px 12px;
    border-radius:999px;background:#fff;border:1px solid var(--line);
    font-size:12px;color:var(--ink-2);box-shadow:var(--shadow-card);
  }

  .grid{display:grid;gap:var(--gap);}
  .grid-2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr));}
  .grid-3{grid-template-columns:repeat(3,1fr);}

  /* ─── Jobs Page ─── */
  .search-filters{
    display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap;
  }
  .filter-chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 12px;border-radius:999px;background:var(--bg-2);
    border:1px dashed var(--line-2);font-size:12px;color:var(--ink-3);cursor:pointer;
  }
  .filter-chip.active{
    background:linear-gradient(135deg,color-mix(in oklab,var(--accent-a) 40%,transparent),color-mix(in oklab,var(--accent-b) 40%,transparent));
    border-color:transparent;color:var(--primary);font-weight:600;
  }
  .filter-chip .x{margin-left:4px;opacity:.5;cursor:pointer;}
  .filter-chip .x:hover{opacity:1;}

  .job-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius-lg);
    padding:20px;box-shadow:var(--shadow-card);transition:.2s;cursor:pointer;
  }
  .job-card:hover{
    box-shadow:0 1px 0 rgba(255,255,255,.9) inset,0 1px 2px rgba(30,20,10,.04),0 16px 40px -12px rgba(255,120,90,.15);
    transform:translateY(-2px);
  }
  .job-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .job-title{font-family:var(--font-display);font-size:18px;font-weight:400;letter-spacing:-.015em;margin:0;color:var(--ink);}
  .job-company{font-size:13px;color:var(--ink-2);margin:4px 0 0;}
  .job-match{
    padding:6px 10px;border-radius:999px;
    background:linear-gradient(135deg,var(--accent-a),var(--accent-b));
    color:#fff;font-size:11px;font-weight:600;white-space:nowrap;
  }
  .job-match.high{background:linear-gradient(135deg,#9FE6C9,#6DCBAE);color:oklch(0.3 0.08 170);}
  .job-match.med{background:linear-gradient(135deg,#A8C5FF,#7FA5FF);color:oklch(0.25 0.05 260);}
  .job-meta{display:flex;gap:16px;margin:14px 0;font-size:12px;color:var(--ink-3);}
  .job-meta span{display:flex;gap:6px;align-items:center;}
  .job-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px;}
  .tag{
    padding:4px 8px;background:var(--bg-2);border-radius:8px;
    font-size:11px;color:var(--ink-3);border:1px dashed var(--line-2);
  }
  .job-cta{display:flex;gap:8px;margin-top:14px;}

  /* ─── Applications Page ─── */
  .app-row{
    display:grid;grid-template-columns:20px 1fr 120px 140px 100px;
    align-items:center;gap:16px;padding:16px 20px;
    border:1px solid var(--line);border-radius:var(--radius-md);
    background:var(--card);margin-bottom:10px;transition:.2s;
  }
  .app-row:hover{box-shadow:var(--shadow-card);}
  .app-checkbox{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--line-2);cursor:pointer;}
  .app-checkbox.checked{background:linear-gradient(135deg,var(--accent-a),var(--accent-b));border-color:transparent;}
  .app-info{display:flex;flex-direction:column;gap:4px;}
  .app-title{font-weight:600;font-size:13.5px;color:var(--ink);}
  .app-company{font-size:12px;color:var(--ink-3);}
  .app-date{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);}
  .app-status{
    display:flex;align-items:center;gap:6px;
    padding:6px 10px;border-radius:999px;font-size:11px;font-weight:600;
    white-space:nowrap;
  }
  .app-status.applied{background:color-mix(in oklab,var(--accent-a) 20%,transparent);color:var(--primary);}
  .app-status.screened{background:color-mix(in oklab,#A8C5FF 20%,transparent);color:oklch(0.28 0.05 260);}
  .app-status.interview{background:color-mix(in oklab,#B4EBD1 20%,transparent);color:oklch(0.3 0.08 170);}
  .app-status.rejected{background:color-mix(in oklab,#FFB3A3 20%,transparent);color:oklch(0.35 0.08 40);}
  .app-status .dot{width:6px;height:6px;border-radius:50%;background:currentColor;}

  .app-progress{height:3px;border-radius:999px;background:var(--line);overflow:hidden;margin-top:8px;}
  .app-progress span{display:block;height:100%;background:linear-gradient(90deg,var(--accent-a),var(--accent-b));transition:.6s ease;}

  /* ─── Interviews Page ─── */
  .calendar-grid{
    display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px;
  }
  .cal-day{
    aspect-ratio:1;display:grid;place-items:center;border:1px solid var(--line);
    border-radius:var(--radius-md);font-size:12px;color:var(--ink-3);background:var(--bg-2);
    cursor:pointer;transition:.2s;
  }
  .cal-day:hover{border-color:var(--primary);background:color-mix(in oklab,var(--primary) 10%,var(--bg-2));}
  .cal-day.other{opacity:.4;}
  .cal-day.today{background:var(--primary);color:#fff;font-weight:600;border-color:var(--primary);}
  .cal-day.event{background:linear-gradient(135deg,color-mix(in oklab,var(--accent-a) 30%,transparent),color-mix(in oklab,var(--accent-b) 30%,transparent));border-color:var(--primary);}

  .interview-card{
    background:var(--card);border:2px solid var(--line);border-radius:var(--radius-lg);
    padding:20px;margin-bottom:16px;transition:.2s;
  }
  .interview-card:hover{border-color:var(--primary);box-shadow:0 8px 24px rgba(255,120,90,.12);}
  .interview-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:12px;}
  .interview-type{
    display:inline-flex;align-items:center;gap:6px;
    padding:6px 10px;border-radius:999px;background:var(--bg-2);font-size:11px;color:var(--ink-2);font-weight:600;
  }
  .interview-type.phone{background:color-mix(in oklab,#A8C5FF 20%,transparent);color:oklch(0.28 0.05 260);}
  .interview-type.video{background:color-mix(in oklab,var(--accent-a) 20%,transparent);color:var(--primary);}
  .interview-type.onsite{background:color-mix(in oklab,#B4EBD1 20%,transparent);color:oklch(0.3 0.08 170);}
  .interview-time{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--ink);margin-top:8px;}
  .interview-prep{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line-2);}
  .prep-item{display:flex;gap:10px;margin-bottom:10px;font-size:12.5px;}
  .prep-item input[type="checkbox"]{width:16px;height:16px;border-radius:6px;cursor:pointer;flex-shrink:0;margin-top:2px;}
  .prep-item label{flex:1;cursor:pointer;color:var(--ink-3);}

  /* ─── Follow-ups Page ─── */
  .followup-timeline{
    position:relative;padding-left:32px;
  }
  .followup-timeline::before{
    content:"";position:absolute;left:4px;top:0;bottom:0;width:2px;
    background:linear-gradient(180deg,var(--accent-a),var(--accent-b));
  }
  .followup-item{
    position:relative;margin-bottom:24px;
  }
  .followup-item::before{
    content:"";position:absolute;left:-28px;top:4px;width:12px;height:12px;
    border-radius:50%;background:var(--bg-2);border:2px solid var(--accent-b);
  }
  .followup-item.pending::before{
    background:var(--accent-a);box-shadow:0 0 0 3px rgba(255,179,154,.3);
  }
  .followup-item.done::before{
    background:linear-gradient(135deg,#B4EBD1,#6DCBAE);border-color:transparent;
  }
  .followup-card{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius-md);
    padding:16px;transition:.2s;
  }
  .followup-card:hover{box-shadow:var(--shadow-card);}
  .followup-title{font-weight:600;font-size:13.5px;margin:0;color:var(--ink);}
  .followup-meta{
    display:flex;gap:12px;margin:8px 0;font-size:12px;color:var(--ink-3);
  }
  .followup-next{
    font-family:var(--font-mono);font-size:11.5px;color:var(--primary);font-weight:600;margin-top:8px;
  }
  .followup-actions{display:flex;gap:8px;margin-top:12px;}

  /* ─── Settings Page ─── */
  .settings-grid{grid-template-columns:280px 1fr;gap:28px;}
  .settings-nav{
    display:flex;flex-direction:column;gap:4px;
    padding:16px;background:var(--card);border:1px solid var(--line);
    border-radius:var(--radius-lg);height:fit-content;position:sticky;top:100px;
  }
  .settings-nav-item{
    padding:12px 14px;border-radius:var(--radius-md);cursor:pointer;
    font-size:13px;color:var(--ink-2);transition:.2s;
  }
  .settings-nav-item:hover,.settings-nav-item.active{
    background:var(--bg-2);color:var(--ink);
  }
  .settings-nav-item.active{
    background:linear-gradient(135deg,color-mix(in oklab,var(--accent-a) 25%,transparent),color-mix(in oklab,var(--accent-b) 25%,transparent));
    color:var(--primary);font-weight:600;
  }
  .settings-section{margin-bottom:28px;}
  .settings-section h3{
    font-family:var(--font-display);font-size:20px;font-weight:400;letter-spacing:-.015em;
    margin:0 0 4px;color:var(--ink);
  }
  .settings-section p{font-size:13px;color:var(--ink-2);margin:0 0 18px;line-height:1.5;}
  .form-group{margin-bottom:20px;}
  .form-label{
    display:block;font-size:12px;font-weight:600;text-transform:uppercase;
    letter-spacing:.08em;color:var(--ink-3);margin-bottom:8px;
  }
  .form-input,.form-select,.form-textarea{
    width:100%;padding:10px 14px;border:1px solid var(--line-2);
    border-radius:var(--radius-md);font-family:inherit;font-size:13px;
    color:var(--ink);background:#fff;transition:.2s;
  }
  .form-input:focus,.form-select:focus,.form-textarea:focus{
    outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,179,154,.2);
  }
  .form-textarea{resize:vertical;min-height:100px;}
  .form-toggle{display:flex;align-items:center;justify-content:space-between;}
  .toggle-switch{
    width:48px;height:28px;background:var(--line-2);border-radius:999px;
    cursor:pointer;position:relative;transition:.3s;
  }
  .toggle-switch::after{
    content:"";position:absolute;left:2px;top:2px;width:24px;height:24px;
    border-radius:50%;background:#fff;transition:.3s;box-shadow:0 2px 6px rgba(0,0,0,.12);
  }
  .toggle-switch.on{background:var(--accent-a);}
  .toggle-switch.on::after{left:calc(100% - 26px);}

  .divider{height:1px;background:var(--line);margin:24px 0;}

  @media(max-width:1080px){
    .grid-3{grid-template-columns:repeat(2,1fr);}
    .settings-grid{grid-template-columns:1fr;}
    .settings-nav{display:flex;flex-direction:row;gap:8px;position:static;flex-wrap:wrap;}
  }
  @media(max-width:720px){
    .shell{padding:24px 18px 120px;}
    .page-head{flex-direction:column;align-items:flex-start;}
    .grid-2,.grid-3{grid-template-columns:1fr;}
    .app-row{grid-template-columns:1fr;gap:8px;}
    .search{display:none;}
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const I = {
  search:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>,
  bell:    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>,
  home:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>,
  briefcase:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>,
  send:    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg>,
  calendar:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>,
  repeat:  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36M20.49 15a9 9 0 0 1-14.85 3.36"/></svg>,
  settings:<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 1v6m0 6v6M4.22 4.22l4.24 4.24m5.08 5.08l4.24 4.24M1 12h6m6 0h6M4.22 19.78l4.24-4.24m5.08-5.08l4.24-4.24"/></svg>,
  check:   <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"/></svg>,
  clock:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>,
  mappin:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>,
  dollar:  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  file:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>,
  x:       <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
  plus:    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
  arrow:   <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>,
};

function TopBar(){

function Sidebar({ page, setPage }){
  const pages = [

// ━━━ INTERVIEWS PAGE ━━━
function InterviewsPage(){

        <button className="btn btn-primary">{I.plus} Schedule new</button>

      <div className="grid grid-2">

              <div style={{flex:1, textAlign:'center', fontWeight:600}}>Tue</div>
              <div style={{flex:1, textAlign:'center', fontWeight:600}}>Wed</div>
              <div style={{flex:1, textAlign:'center', fontWeight:600}}>Thu</div>
              <div style={{flex:1, textAlign:'center', fontWeight:600}}>Fri</div>
              <div style={{flex:1, textAlign:'center', fontWeight:600}}>Sat</div>
            </div>
            <div className="calendar-grid">
              {Array(42).fill(0).map((_,i)=>{
                const d = i-6;
                const isToday = d===24;
                const hasEvent = d===25 || d===26;
                return (
                  <div key={i} className={`cal-day ${d<1||d>30?'other':''} ${isToday?'today':''} ${hasEvent?'event':''}`}>
                    {d>0&&d<=30 ? d : (d>30?d-30:d+30)}

        <div>
          {interviews.map(int => (
            <div key={int.id} className="interview-card">
              <div className="interview-head">
                <div>
                  <h4 style={{margin:'0 0 4px', fontSize:14, fontWeight:600, color:'var(--ink)'}}>{int.role}</h4>

                {int.prep.map((p,i)=>(
